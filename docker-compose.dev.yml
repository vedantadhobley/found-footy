# Development Docker Compose - Temporal orchestration
#
# HTTP services are reachable via Caddy on the `proxy` network.
# See ~/workspace/proxy/Caddyfile for hostname routes:
#   found-footy-dev-temporal-ui.{$BASE_DOMAIN} → temporal-ui:8080
#   found-footy-dev-mongoku.{$BASE_DOMAIN}     → mongoku:3100
#   found-footy-dev-minio.{$BASE_DOMAIN}       → minio:9001
#   found-footy-dev-twitter.{$BASE_DOMAIN}     → twitter:6080 (noVNC)
#
# Non-HTTP host port retained:
#   7233: Temporal gRPC (for host-side dev clients connecting to dev temporal)
#
# External services (via the luv-dev shared docker network → tailnet split-DNS):
#   - http://llama-small.joi (LLM API - llama.cpp Qwen3-VL-8B chat+vision)
#     Hostname is served by joi's own Caddy; no port needed. See LLAMA_URL in .env.
#
# Internal ports (not exposed to host, reachable on luv-dev / found-footy-dev):
#   - found-footy-dev-postgres:5432 (Temporal metadata)
#   - found-footy-dev-mongo:27017  (Application data)
#   - found-footy-dev-minio:9000   (S3 storage)

name: found-footy-dev

services:
  # TWITTER SERVICE - handles Twitter scraping with GUI access
  twitter:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: found-footy-dev-twitter
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace
      TWITTER_COOKIES_FILE: /data/twitter_cookies.pkl
      TWITTER_COOKIE_BACKUP_PATH: /config/twitter_cookies.json
      TWITTER_SERVICE_HOST: "0.0.0.0"
      TWITTER_SERVICE_PORT: "8888"
      TWITTER_HEADLESS: "false"  # GUI mode - full browser visible via noVNC!
      DISPLAY: ":99"
      VNC_PORT: "5900"
      NOVNC_PORT: "6080"
    volumes:
      - .:/workspace  # Mount entire project for development
      - found-footy-dev-twitter-cookies:/data
      - ~/.config/found-footy:/config  # Cookie backup (outside repo)
    networks:
      - found-footy-dev
      - proxy
    restart: unless-stopped
    command: bash /workspace/twitter/start_with_vnc.sh

  # POSTGRESQL - Temporal metadata storage
  postgres:
    image: postgres:15-alpine
    container_name: found-footy-dev-postgres
    environment:
      POSTGRES_USER: ffuser
      POSTGRES_PASSWORD: ffpass
      POSTGRES_DB: temporal
    volumes:
      - found-footy-dev-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ffuser -d temporal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - found-footy-dev
      - luv-dev

  # MONGODB - application data storage (standalone, no replica set needed)
  # Tuned for low CPU: 256MB cache (default uses 50% of RAM)
  mongo:
    image: mongo:7-jammy
    container_name: found-footy-dev-mongo
    command: mongod --wiredTigerCacheSizeGB 0.25
    environment:
      MONGO_INITDB_ROOT_USERNAME: ffuser
      MONGO_INITDB_ROOT_PASSWORD: ffpass
      MONGO_INITDB_DATABASE: found_footy
    volumes:
      - found-footy-dev-mongo-data:/data/db
      - found-footy-dev-mongo-config:/data/configdb
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - found-footy-dev
      - luv-dev
  
  # MONGOKU - MongoDB web GUI (supports integer IDs)
  mongoku:
    image: huggingface/mongoku:latest
    container_name: found-footy-dev-mongoku
    environment:
      MONGOKU_DEFAULT_HOST: mongodb://ffuser:ffpass@found-footy-dev-mongo:27017
      MONGOKU_SERVER_ORIGIN: http://found-footy-dev-mongoku.${BASE_DOMAIN:-luv}
      MONGOKU_ALLOW_DELETE: "true"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - found-footy-dev
      - proxy

  # MINIO - S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: found-footy-dev-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ffuser
      MINIO_ROOT_PASSWORD: ffpass--
    volumes:
      - found-footy-dev-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - found-footy-dev
      - luv-dev
      - proxy

  # TEMPORAL SERVER - Workflow orchestration
  temporal:
    image: temporalio/auto-setup:latest
    container_name: found-footy-dev-temporal
    ports:
      - "7233:7233"  # Temporal server
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=ffuser
      - POSTGRES_PWD=ffpass
      - POSTGRES_SEEDS=found-footy-dev-postgres
      - BIND_ON_IP=0.0.0.0  # Bind to all interfaces
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - found-footy-dev
    restart: unless-stopped

  # TEMPORAL UI - Web interface
  temporal-ui:
    image: temporalio/ui:latest
    container_name: found-footy-dev-temporal-ui
    environment:
      - TEMPORAL_ADDRESS=found-footy-dev-temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://found-footy-dev-temporal-ui.${BASE_DOMAIN:-luv}
    depends_on:
      - temporal
    networks:
      - found-footy-dev
      - proxy
    restart: unless-stopped

  # LLAMA.CPP SERVER - Reached at http://llama-small.joi via the luv-dev shared network.

  # TEMPORAL WORKER - Executes workflows
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: found-footy-dev-worker
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace
      TEMPORAL_HOST: found-footy-dev-temporal:7233
      MONGODB_URI: mongodb://ffuser:ffpass@found-footy-dev-mongo:27017/found_footy?authSource=admin
      S3_ENDPOINT_URL: http://found-footy-dev-minio:9000
      S3_ACCESS_KEY: ffuser
      S3_SECRET_KEY: ffpass--
      S3_BUCKET_NAME: footy-videos
      TWITTER_SESSION_URL: http://found-footy-dev-twitter:8888
      FRONTEND_API_URL: http://vedanta-systems-dev-api:3001
      # Phase 6 (P6-3): dual-publish path — worker pushes invalidation
      # events to the new FastAPI service alongside the legacy Express
      # endpoint. Both run in parallel until cutover.
      FOUND_FOOTY_API_URL: http://found-footy-dev-api:8080
      LLAMA_URL: ${LLAMA_URL}
    volumes:
      - .:/workspace
      - ~/.config/found-footy:/config  # Cookie backup (shared with twitter service)
    networks:
      - found-footy-dev
      - luv-dev  # Shared network for frontend API
    depends_on:
      - temporal
      - mongo
    restart: unless-stopped
    command: python /workspace/src/worker.py

  # Phase 6 (P6-4): new FastAPI service. Read API + SSE for
  # vedanta-systems frontend. Stands up alongside the existing Express
  # router in vedanta-systems; cutover endpoint-by-endpoint later.
  # Caddy route: found-footy-dev-api.${BASE_DOMAIN} (see deploy/INFRA-NOTES.md).
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: found-footy-dev-api
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace
      MONGODB_URI: mongodb://ffuser:ffpass@found-footy-dev-mongo:27017/found_footy?authSource=admin
      MONGODB_DB_NAME: found_footy
      S3_ENDPOINT: http://found-footy-dev-minio:9000
      S3_ACCESS_KEY: ffuser
      S3_SECRET_KEY: ffpass--
      S3_BUCKET: footy-videos
      # Dev: empty token (relies on docker network isolation). Set in
      # prod compose to a strong shared secret.
      INTERNAL_TOKEN: ""
      # Dev: allow any origin (frontend served from vedanta-systems-dev
      # on the luv-dev network; tightening this is part of prod hardening).
      CORS_ORIGINS: "*"
      LOG_LEVEL: INFO
    volumes:
      - .:/workspace
    networks:
      - found-footy-dev
      - luv-dev   # so vedanta-systems-dev-api can proxy to us (future cutover)
      - proxy     # Caddy reverse proxy
    depends_on:
      - mongo
    restart: unless-stopped
    command: uvicorn api.app:app --host 0.0.0.0 --port 8080

volumes:
  found-footy-dev-postgres-data:
    name: found-footy-dev-postgres-data
    driver: local
  found-footy-dev-mongo-data:
    name: found-footy-dev-mongo-data
    driver: local
  found-footy-dev-mongo-config:
    name: found-footy-dev-mongo-config
    driver: local
  found-footy-dev-minio-data:
    name: found-footy-dev-minio-data
    driver: local
  found-footy-dev-twitter-cookies:
    name: found-footy-dev-twitter-cookies
    driver: local

networks:
  # Internal network for this project
  found-footy-dev:
    name: found-footy-dev  # Explicit name to avoid Docker Compose prefix
    driver: bridge
  
  # Shared network - frontend and other projects join this to communicate
  luv-dev:
    external: true

  # Caddy reverse proxy fronts HTTP services here.
  # See ~/workspace/proxy/Caddyfile for hostname routes.
  proxy:
    external: true
